                - generic [ref=f10e65]:
                    - article [ref=f10e66]:
                        - generic [ref=f10e67]: MEMORY
                        - heading "Deterministic, not probabilistic" [level=3] [ref=f10e68]
                        - paragraph [ref=f10e69]: Every agent state, every capability invocation, every execution trace — written to a structured memory graph. Recall is exact. Audit is complete. LLMs read memory; they do not own it.
                    - article [ref=f10e70]:
                        - generic [ref=f10e71]: CAPABILITIES
                        - heading "Composed, not prompted" [level=3] [ref=f10e72]
                        - paragraph [ref=f10e73]: Capabilities are registered, typed, versioned, and governed. An agent selects from a registry — not from inference. The capability boundary is the system boundary.
                    - article [ref=f10e74]:
                        - generic [ref=f10e75]: MODELS
                        - heading "Consumed, not trusted" [level=3] [ref=f10e76]
                        - paragraph [ref=f10e77]: Language models are inference endpoints. They generate; they do not decide. Every model output is validated against a contract before it touches state. The model is the last call, not the first.
