                        - generic [ref=e67]: MEMORY
                        - heading "Deterministic, not probabilistic" [level=3] [ref=e68]
                        - paragraph [ref=e69]: Every agent state, every capability invocation, every execution trace — written to a structured memory graph. Recall is exact. Audit is complete. LLMs read memory; they do not own it.
                    - article [ref=e70]:
                        - generic [ref=e71]: CAPABILITIES
                        - heading "Composed, not prompted" [level=3] [ref=e72]
                        - paragraph [ref=e73]: Capabilities are registered, typed, versioned, and governed. An agent selects from a registry — not from inference. The capability boundary is the system boundary.
                    - article [ref=e74]:
                        - generic [ref=e75]: MODELS
                        - heading "Consumed, not trusted" [level=3] [ref=e76]
                        - paragraph [ref=e77]: Language models are inference endpoints. They generate; they do not decide. Every model output is validated against a contract before it touches state. The model is the last call, not the first.
