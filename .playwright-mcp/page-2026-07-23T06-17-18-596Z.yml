                    - article [ref=f1e66]:
                        - generic [ref=f1e67]: MEMORY
                        - heading "Deterministic, not probabilistic" [level=3] [ref=f1e68]
                        - paragraph [ref=f1e69]: Every agent state, every capability invocation, every execution trace — written to a structured memory graph. Recall is exact. Audit is complete. LLMs read memory; they do not own it.
                    - article [ref=f1e70]:
                        - generic [ref=f1e71]: CAPABILITIES
                        - heading "Composed, not prompted" [level=3] [ref=f1e72]
                        - paragraph [ref=f1e73]: Capabilities are registered, typed, versioned, and governed. An agent selects from a registry — not from inference. The capability boundary is the system boundary.
                    - article [ref=f1e74]:
                        - generic [ref=f1e75]: MODELS
                        - heading "Consumed, not trusted" [level=3] [ref=f1e76]
                        - paragraph [ref=f1e77]: Language models are inference endpoints. They generate; they do not decide. Every model output is validated against a contract before it touches state. The model is the last call, not the first.
