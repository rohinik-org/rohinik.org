                - generic [ref=f6e65]:
                    - article [ref=f6e66]:
                        - generic [ref=f6e67]: MEMORY
                        - heading "Deterministic, not probabilistic" [level=3] [ref=f6e68]
                        - paragraph [ref=f6e69]: Every agent state, every capability invocation, every execution trace — written to a structured memory graph. Recall is exact. Audit is complete. LLMs read memory; they do not own it.
                    - article [ref=f6e70]:
                        - generic [ref=f6e71]: CAPABILITIES
                        - heading "Composed, not prompted" [level=3] [ref=f6e72]
                        - paragraph [ref=f6e73]: Capabilities are registered, typed, versioned, and governed. An agent selects from a registry — not from inference. The capability boundary is the system boundary.
                    - article [ref=f6e74]:
                        - generic [ref=f6e75]: MODELS
                        - heading "Consumed, not trusted" [level=3] [ref=f6e76]
                        - paragraph [ref=f6e77]: Language models are inference endpoints. They generate; they do not decide. Every model output is validated against a contract before it touches state. The model is the last call, not the first.
